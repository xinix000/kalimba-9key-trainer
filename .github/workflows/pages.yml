name: Deploy to GitHub Pages

# ขึ้นเว็บใหม่ทุกครั้งที่ push เข้า main โดย deploy เฉพาะโฟลเดอร์ web/
# (server.py ใช้เฉพาะตอนรันในบ้าน ไม่ต้องขึ้นเว็บ)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # ต่อเลขคอมมิตท้ายชื่อไฟล์ css/js ทุกครั้งที่ deploy
      # ไม่งั้นมือถือจะใช้ไฟล์เก่าที่แคชไว้ แก้เพลงแล้วเปิดดูก็ยังเป็นของเดิม
      - name: ใส่เลขเวอร์ชันกันแคช
        run: |
          V="${GITHUB_SHA::7}"
          for f in styles.css songs.js audio.js app.js manifest.webmanifest; do
            sed -i "s|\"$f\"|\"$f?v=$V\"|g" web/index.html
          done
          echo "เวอร์ชัน $V"
          grep -E '\?v=' web/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v4
